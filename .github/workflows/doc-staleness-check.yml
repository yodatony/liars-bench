name: doc-staleness-check

on:
  workflow_dispatch:
  schedule:
    - cron: '55 2 1 * *'   # 1st of every month at 02:55 UTC

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  check-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check staleness and rewrite docs via GitHub Models
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          $OpenPRs = gh pr list --repo $env:REPO --state open --json headRefName | ConvertFrom-Json

          $WorkflowFiles = Get-ChildItem ".github/workflows/*.yml"

          foreach ($WfFile in $WorkflowFiles) {
              $WorkflowFile = $WfFile.FullName.Replace($PWD.Path + [System.IO.Path]::DirectorySeparatorChar, "").Replace("\", "/")
              $WorkflowName = $WfFile.BaseName
              $DocFile      = "docs/workflows/$WorkflowName.md"

              Write-Host "Checking: $WorkflowFile"

              # Get the last commit date for the workflow and the doc
              $WorkflowDate = git log -1 --format="%ci" -- $WorkflowFile 2>$null
              $DocDate      = git log -1 --format="%ci" -- $DocFile      2>$null

              if (-not $WorkflowDate) {
                  Write-Host "  No commits found for workflow, skipping."
                  continue
              }

              # If the doc has never been committed, or workflow is newer than doc -> stale
              $IsStale = (-not $DocDate) -or ([datetime]$WorkflowDate -gt [datetime]$DocDate)
              Write-Host "  Workflow last changed: $WorkflowDate"
              Write-Host "  Doc last changed:      $(if ($DocDate) { $DocDate } else { 'never' })"
              Write-Host "  Stale: $IsStale"

              if (-not $IsStale) { continue }

              # Check if an open PR already exists for this doc
              if ($OpenPRs | Where-Object { $_.headRefName -like "doc-update/$WorkflowName*" }) {
                  Write-Host "  Open PR already exists, skipping."
                  continue
              }

              $BranchName = "doc-update/$WorkflowName-$(Get-Date -Format 'yyyyMMdd')"

              # Read current files
              $WorkflowContent = Get-Content $WorkflowFile -Raw
              $CurrentDoc      = if (Test-Path $DocFile) { Get-Content $DocFile -Raw } else { "" }
              $Today           = (Get-Date -Format 'yyyy-MM-dd')

              # Recent commits to the workflow since the doc was last updated
              $CommitLines = if ($DocDate) {
                  git log --oneline --after="$DocDate" -- $WorkflowFile 2>$null
              } else {
                  git log --oneline -- $WorkflowFile 2>$null
              }
              $CommitList = ($CommitLines | Where-Object { $_ -ne "" }) -join "`n"

              # Call GitHub Models API (gpt-4o-mini, free with GITHUB_TOKEN)
              $PromptLines = @(
                  "You are a technical writer. Update the documentation file below to reflect the current state of the workflow file.",
                  "",
                  "Follow the Diataxis framework with these four sections:",
                  "1. Reference - triggers, secrets, tickers/instruments table, output fields, API/data sources",
                  "2. How-to guides - step-by-step instructions for common tasks",
                  "3. Explanation - design decisions and reasoning",
                  "",
                  "Rules:",
                  "- Update the Last reviewed date at the top to $Today",
                  "- Keep all existing Explanation and How-to content unless the workflow changes make it incorrect",
                  "- Update Reference tables to match the current workflow exactly",
                  "- Do not add commentary or preamble - output only the raw markdown document",
                  "",
                  "## Current workflow file ($WorkflowFile)",
                  "",
                  '```yaml',
                  $WorkflowContent,
                  '```',
                  "",
                  "## Current documentation ($DocFile)",
                  "",
                  $CurrentDoc,
                  "",
                  "## Recent commits to the workflow since the doc was last updated",
                  "",
                  $CommitList
              )
              $Prompt = $PromptLines -join "`n"

              $RequestBody = @{
                  model    = "gpt-4o-mini"
                  messages = @(
                      @{ role = "user"; content = $Prompt }
                  )
                  max_tokens = 4096
              } | ConvertTo-Json -Depth 10

              $Response = Invoke-RestMethod `
                  -Uri     "https://models.inference.ai.azure.com/chat/completions" `
                  -Method  Post `
                  -Headers @{
                      "Authorization" = "Bearer $env:GH_TOKEN"
                      "Content-Type"  = "application/json"
                  } `
                  -Body $RequestBody `
                  -ErrorAction Stop

              $NewDocContent = $Response.choices[0].message.content

              # Create branch, commit, open PR
              $DocExists  = Test-Path $DocFile
              $Action     = if ($DocExists) { "update" } else { "create" }
              $CommitMsg  = if ($DocExists) { "docs: auto-update $DocFile (workflow changed since last doc edit)" } else { "docs: create $DocFile" }
              $PRTitle    = if ($DocExists) { "📝 Doc update: $WorkflowName" } else { "📝 New doc: $WorkflowName" }

              git checkout main
              git checkout -b $BranchName

              $null = New-Item -ItemType Directory -Force -Path (Split-Path $DocFile)
              Set-Content -Path $DocFile -Value $NewDocContent -NoNewline
              git add $DocFile
              git commit -m $CommitMsg
              git push origin $BranchName

              $PRBodyLines = @(
                  "This PR was automatically generated because ``$WorkflowFile`` was modified after the documentation was last $Action`d.",
                  "",
                  "| | Date |",
                  "|---|---|",
                  "| Workflow last changed | $WorkflowDate |",
                  "| Doc last changed | $(if ($DocDate) { $DocDate } else { 'never' }) |",
                  "",
                  "Please review the $Action`d documentation for accuracy, then merge or request changes.",
                  "",
                  "## Workflow commits since last doc update",
                  "",
                  $CommitList
              )
              $PRBody = $PRBodyLines -join "`n"

              gh pr create `
                  --repo  $env:REPO `
                  --title $PRTitle `
                  --body  $PRBody `
                  --base  main `
                  --head  $BranchName `
                  --label "documentation"

              Write-Host "  PR created for $DocFile"
          }

