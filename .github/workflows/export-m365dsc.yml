name: Export M365 DSC Configuration

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  workflow_dispatch:

jobs:
  export-m365dsc:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up PowerShell
      uses: actions/setup-powershell@v2

    - name: Install Microsoft365DSC module
      run: Install-Module -Name Microsoft365DSC -Force -Scope CurrentUser

    - name: Export M365 DSC Configuration
      run: |
        $TenantId = 'your-tenant-id'
        $ApplicationId = 'your-application-id'
        $ApplicationSecret = 'your-application-secret'
        $Params = @{
          TenantId = $TenantId
          ApplicationId = $ApplicationId
          ApplicationSecret = $ApplicationSecret
          ComponentsToExtract = @("AADTenantDetails")
          FileName = "Configuration.ps1"
          Quiet = $true
          Verbose = $true
        }
        Export-M365DSCConfiguration @Params
