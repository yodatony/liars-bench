name: Market Big Move Alert

on:
  schedule:
    - cron: '*/15 7-21 * * 1-5'
  workflow_dispatch:

jobs:
  check-moves:
    name: Check moves
    runs-on: ubuntu-latest
    steps:
      - name: Check for big intraday moves
        shell: pwsh
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          $TZ     = [System.TimeZoneInfo]::FindSystemTimeZoneById('Europe/Stockholm')
          $Now    = [System.TimeZoneInfo]::ConvertTimeFromUtc([DateTime]::UtcNow, $TZ)
          $T      = $Now.Hour * 60 + $Now.Minute
          $Dow    = $Now.DayOfWeek.ToString()

          if ($Dow -in @('Saturday','Sunday') -or $Now.Hour -lt 9 -or $Now.Hour -ge 22) {
              Write-Host "Outside window, skipping."; exit 0
          }

          $Threshold = 2.0
          $Indices = @(
              @{ Name = "OMXS30";    Ticker = "^OMX";    Market = "SE"; OpenFrom = 540;  OpenTo = 1050 }
              @{ Name = "OMXSPI";    Ticker = "^OMXSPI"; Market = "SE"; OpenFrom = 540;  OpenTo = 1050 }
              @{ Name = "S&P 500";   Ticker = "^GSPC";   Market = "US"; OpenFrom = 930;  OpenTo = 1320 }
              @{ Name = "Dow Jones"; Ticker = "^DJI";    Market = "US"; OpenFrom = 930;  OpenTo = 1320 }
          )

          $Alerts = @()
          foreach ($idx in $Indices) {
              # Only check when the market is actually open (avoid stale yesterday data)
              if ($T -lt $idx.OpenFrom -or $T -ge $idx.OpenTo) { continue }

              try {
                  $Enc  = [Uri]::EscapeDataString($idx.Ticker)
                  $R    = Invoke-RestMethod `
                              -Uri "https://query1.finance.yahoo.com/v8/finance/chart/$Enc" `
                              -Headers @{ "User-Agent" = "Mozilla/5.0" } -ErrorAction Stop
                  $Meta = $R.chart.result[0].meta
                  $Pct  = [math]::Round($Meta.regularMarketChangePercent, 2)
                  $Price = [math]::Round($Meta.regularMarketPrice, 2)

                  if ([math]::Abs($Pct) -ge $Threshold) {
                      $Arrow   = if ($Pct -ge 0) { "▲ +$Pct%" } else { "▼ $Pct%" }
                      $Alerts += "*$($idx.Market): $($idx.Name)*: $Price ($Arrow)"
                  }
              } catch {
                  Write-Warning "Failed $($idx.Name): $_"
              }
          }

          if ($Alerts.Count -eq 0) { Write-Host "No big moves detected."; exit 0 }

          $lines = @(
              "*⚠️ Big Move Alert — $($Now.ToString('yyyy-MM-dd HH:mm')) CET*"
              ""
          ) + $Alerts + @(
              ""
              "_Intraday move ≥ $Threshold% from previous close_"
          )

          $body = @{
              chat_id    = $env:TELEGRAM_CHAT_ID
              text       = ($lines -join "`n")
              parse_mode = "Markdown"
          } | ConvertTo-Json -Depth 3

          Invoke-RestMethod -Uri "https://api.telegram.org/bot$($env:TELEGRAM_TOKEN)/sendMessage" `
              -Method Post -Body $body -ContentType "application/json; charset=utf-8"
          Write-Host "Alert sent for: $($Alerts -join ', ')"
