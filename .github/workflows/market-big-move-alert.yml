name: market-big-move-alert

on:
  workflow_dispatch: # Triggered externally on schedule via cron-job.org

jobs:
  check-moves:
    runs-on: ubuntu-latest
    steps:
      - name: Check for big intraday moves
        shell: pwsh
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVEDATA_KEY:   ${{ secrets.TWELVEDATA_KEY }}
        run: |
          $TZ     = [System.TimeZoneInfo]::FindSystemTimeZoneById('Europe/Stockholm')
          $Now    = [System.TimeZoneInfo]::ConvertTimeFromUtc([DateTime]::UtcNow, $TZ)
          $T      = $Now.Hour * 60 + $Now.Minute

          $Threshold  = 2.0
          $MarketClosed = $T -lt 930 -or $T -ge 1320  # US market open 15:30–22:00 CET
          $Indices = @(
              @{ Name = "NVIDIA";    Ticker = "NVDA";  Market = "US"; Own = $false }
              @{ Name = "Apple";     Ticker = "AAPL";  Market = "US"; Own = $false }
              @{ Name = "Microsoft"; Ticker = "MSFT";  Market = "US"; Own = $true  }
              @{ Name = "Amazon";    Ticker = "AMZN";  Market = "US"; Own = $false }
              @{ Name = "Google A";    Ticker = "GOOGL"; Market = "US"; Own = $false }
              @{ Name = "Tesla";     Ticker = "TSLA";  Market = "US"; Own = $false }
          )

          $Alerts = @()
          foreach ($idx in $Indices) {
              try {
                  $Enc  = [Uri]::EscapeDataString($idx.Ticker)
                  $R    = Invoke-RestMethod `
                              -Uri "https://api.twelvedata.com/quote?symbol=$Enc&apikey=$($env:TWELVEDATA_KEY)" `
                              -ErrorAction Stop
                  if ($R.status -eq "error") { throw "Twelve Data: $($R.message)" }
                  $Pct   = [math]::Round([double]$R.percent_change, 2)
                  $Price = [math]::Round([double]$R.close, 2)

                  if ([math]::Abs($Pct) -ge $Threshold) {
                      $Flag      = "🇺🇸"
                      $Portfolio = if ($idx.Own) { ' 💼' } else { '' }
                      $Arrow     = if ($MarketClosed) {
                                       if ($Pct -ge 0) { "▲ +$Pct%" } else { "▼ $Pct%" }
                                   } else {
                                       if ($Pct -ge 0) { "🟢 +$Pct%" } else { "🔴 $Pct%" }
                                   }
                      $Alerts   += "<b>$Flag $($idx.Ticker)</b>: $Price $Arrow$Portfolio"
                  }
              } catch {
                  Write-Warning "Failed $($idx.Name): $_"
              }
          }

          if ($Alerts.Count -eq 0) { Write-Host "No big moves detected."; exit 0 }

          $lines = @(
              "<b>Big Move Alert ⚠️</b>"
              "$($Now.ToString('yyyy-MM-dd HH:mm')) CET"
              "<i>Intraday move >2% — $(if ($MarketClosed) { 'Closed 🔕' } else { 'Open 🔔' })</i>"
              ""
          ) + $Alerts

          $body = @{
              chat_id    = $env:TELEGRAM_CHAT_ID
              text       = ($lines -join "`n")
              parse_mode = "HTML"
          } | ConvertTo-Json -Depth 3

          Invoke-RestMethod -Uri "https://api.telegram.org/bot$($env:TELEGRAM_TOKEN)/sendMessage" `
              -Method Post -Body $body -ContentType "application/json; charset=utf-8"
          Write-Host "Alert sent for: $($Alerts -join ', ')"
