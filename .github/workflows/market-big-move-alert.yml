name: market-big-move-alert

on:
  workflow_dispatch:

jobs:
  check-moves:
    runs-on: ubuntu-latest
    steps:
      - name: Check for big intraday moves
        shell: pwsh
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVEDATA_KEY:   ${{ secrets.TWELVEDATA_KEY }}
        run: |
          $TZ     = [System.TimeZoneInfo]::FindSystemTimeZoneById('Europe/Stockholm')
          $Now    = [System.TimeZoneInfo]::ConvertTimeFromUtc([DateTime]::UtcNow, $TZ)
          $T      = $Now.Hour * 60 + $Now.Minute
          $Dow    = $Now.DayOfWeek.ToString()

          $Threshold = 2.0
          $Indices = @(
              @{ Name = "S&P 500";          Ticker = "SPY";  Market = "US";     Source = "TwelveData"; Multiplier = 10; Decimals = 1 }
              @{ Name = "DJUS";  Ticker = "IYY";  Market = "US";     Source = "TwelveData"; Multiplier = 10; Decimals = 1 }
              @{ Name = "DJI"; Ticker = "DIA";  Market = "US";     Source = "TwelveData"; Multiplier = 100; Decimals = 0 }
              @{ Name = "Microsoft";                Ticker = "MSFT"; Market = "US";     Source = "TwelveData"; Multiplier = 1; Decimals = 2 }
              @{ Name = "Bitcoin";                  Ticker = "BTC/USD"; Market = "CRYPTO"; Source = "TwelveData"; Multiplier = 1; Decimals = 2 }
          )

          $Alerts = @()
          foreach ($idx in $Indices) {
              if ($T -lt $idx.OpenFrom -or $T -ge $idx.OpenTo) { continue }

              try {
                  $Enc  = [Uri]::EscapeDataString($idx.Ticker)
                  $R    = Invoke-RestMethod `
                              -Uri "https://api.twelvedata.com/quote?symbol=$Enc&apikey=$($env:TWELVEDATA_KEY)" `
                              -ErrorAction Stop
                  if ($R.status -eq "error") { throw "Twelve Data: $($R.message)" }
                  $Pct   = [math]::Round([double]$R.percent_change, 2)
                  $Price = [math]::Round([double]$R.close, 2)

                  if ([math]::Abs($Pct) -ge $Threshold) {
                      $Arrow   = if ($Pct -ge 0) { "▲ +$Pct%" } else { "▼ $Pct%" }
                      $Alerts += "*$($idx.Name)*: $Price ($Arrow)"
                  }
              } catch {
                  Write-Warning "Failed $($idx.Name): $_"
              }
          }

          if ($Alerts.Count -eq 0) { Write-Host "No big moves detected."; exit 0 }

          $lines = @(
              "<b>⚠️ Big Move Alert</b>"
              "<b>$($Now.ToString('yyyy-MM-dd HH:mm')) CET</b>"
              ""
          ) + $Alerts + @(
              ""
              "<i>Intraday move ≥ $Threshold% from previous close</i>"
              ""
              "<u><i>repo liars-bench</i></u>"
          )

          $body = @{
              chat_id    = $env:TELEGRAM_CHAT_ID
              text       = ($lines -join "`n")
              parse_mode = "HTML"
          } | ConvertTo-Json -Depth 3

          Invoke-RestMethod -Uri "https://api.telegram.org/bot$($env:TELEGRAM_TOKEN)/sendMessage" `
              -Method Post -Body $body -ContentType "application/json; charset=utf-8"
          Write-Host "Alert sent for: $($Alerts -join ', ')"
