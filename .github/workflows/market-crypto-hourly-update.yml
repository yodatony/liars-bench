name: market-crypto-hourly-update

on:
  workflow_dispatch: # Triggered externally on schedule via cron-job.org

jobs:
  send-update:
    runs-on: ubuntu-latest
    steps:
      - name: Send crypto update to Telegram
        shell: pwsh
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVEDATA_KEY:   ${{ secrets.TWELVEDATA_KEY }}
        run: |
          $TZ  = [System.TimeZoneInfo]::FindSystemTimeZoneById('Europe/Stockholm')
          $Now = [System.TimeZoneInfo]::ConvertTimeFromUtc([DateTime]::UtcNow, $TZ)

          $Indices = @(
              @{ Name = "BTC/USD";  Ticker = "BTC/USD"; Market = "CRYPTO"; Own = $true }
              @{ Name = "ETH/USD";  Ticker = "ETH/USD"; Market = "CRYPTO"; Own = $true }
              @{ Name = "XRP/USD";  Ticker = "XRP/USD"; Market = "CRYPTO"; Own = $true }
          )

          function Get-IndexData([string]$Ticker) {
              $Enc = [Uri]::EscapeDataString($Ticker)
              $R   = Invoke-RestMethod `
                         -Uri "https://api.twelvedata.com/quote?symbol=$Enc&apikey=$($env:TWELVEDATA_KEY)" `
                         -ErrorAction Stop
              if ($R.status -eq "error") { throw "TwelveData: $($R.message)" }
              [PSCustomObject]@{
                  Current = [math]::Round([double]$R.close, 2)
                  DayPct  = [math]::Round([double]$R.percent_change, 2)
              }
          }

          function Fmt([object]$v) {
              if ($null -eq $v) { return "N/A" }
              "$(if ($v -ge 0) { "(+$v%) 🟢" } else { "($v%) 🔴" })"
          }

          $lines = @(
              "<b>CRYPTO</b> — Hourly update 📈"
              "$($Now.ToString('yyyy-MM-dd HH:mm')) CET"
              "<i>💵 Open 24/7 🔔</i>"
              ""
          )

          foreach ($idx in $Indices) {
              try {
                  $d         = Get-IndexData $idx.Ticker
                  $Portfolio = if ($idx.Own) { '💼' } else { '' }
                  $lines += "<b>$($idx.Name)</b> $($d.Current) $(Fmt $d.DayPct) $Portfolio"
              } catch {
                  $lines += "<b>$($idx.Name)</b> — unavailable ⚠️"
                  $lines += "  <i>Error: $($_.Exception.Message)</i>"
              }
          }

          $body = @{
              chat_id    = $env:TELEGRAM_CHAT_ID
              text       = ($lines -join "`n")
              parse_mode = "HTML"
          } | ConvertTo-Json -Depth 3

          Invoke-RestMethod -Uri "https://api.telegram.org/bot$($env:TELEGRAM_TOKEN)/sendMessage" `
              -Method Post -Body $body -ContentType "application/json; charset=utf-8"
          Write-Host "Sent at $($Now.ToString('HH:mm')) CET"