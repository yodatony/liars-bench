name: market-crypto-weekly-digest

on:
  workflow_dispatch:
  schedule:
    - cron: '49 5 * * 0'

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Send crypto weekly digest
        shell: pwsh
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVEDATA_KEY:   ${{ secrets.TWELVEDATA_KEY }}
        run: |
          $TZ  = [System.TimeZoneInfo]::FindSystemTimeZoneById('Europe/Stockholm')
          $Now = [System.TimeZoneInfo]::ConvertTimeFromUtc([DateTime]::UtcNow, $TZ)

          $Indices = @(
              @{ Name = "BNB/USD";   Ticker = "BNB/USD";   Market = "CRYPTO"; Own = $false }
              @{ Name = "BTC/USD";   Ticker = "BTC/USD";   Market = "CRYPTO"; Own = $true  }
              @{ Name = "ETH/USD";   Ticker = "ETH/USD";   Market = "CRYPTO"; Own = $true  }
              @{ Name = "HYPE/USD";  Ticker = "HYPE/USD";  Market = "CRYPTO"; Own = $true; Source = "COINGECKO"; CoinId = "hyperliquid" }
              @{ Name = "SOL/USD";   Ticker = "SOL/USD";   Market = "CRYPTO"; Own = $false }
              @{ Name = "XRP/USD";   Ticker = "XRP/USD";   Market = "CRYPTO"; Own = $true  }
          )

          function Get-CryptoWeeklyData([string]$Ticker) {
              # Monday open vs real-time latest price
              $Enc  = [Uri]::EscapeDataString($Ticker)
              $R    = Invoke-RestMethod `
                          -Uri "https://api.twelvedata.com/time_series?symbol=$Enc&interval=1day&outputsize=366&apikey=$($env:TWELVEDATA_KEY)" `
                          -ErrorAction Stop
              if ($R.status -eq "error") { throw "Twelve Data: $($R.message)" }
              $Rows = @($R.values | ForEach-Object {
                  [PSCustomObject]@{ date = $_.datetime; open = [double]$_.open; close = [double]$_.close }
              })
              $N = $Rows.Count
              if ($N -eq 0) { throw "No data returned for $Ticker" }
              $MondayRow = $Rows | Where-Object { [DateTime]::Parse($_.date).DayOfWeek -eq 'Monday' } | Select-Object -First 1
              if (-not $MondayRow) { throw "No Monday candle found for $Ticker" }
              $MondayOpen = $MondayRow.open
              $PriceR = Invoke-RestMethod `
                            -Uri "https://api.twelvedata.com/price?symbol=$Enc&apikey=$($env:TWELVEDATA_KEY)" `
                            -ErrorAction Stop
              if ($PriceR.status -eq "error") { throw "Twelve Data price: $($PriceR.message)" }
              $LatestPrice = [double]$PriceR.price
              function Pct($From) {
                  if (-not $From -or $From -eq 0) { return $null }
                  [math]::Round(($LatestPrice - $From) / $From * 100, 2)
              }
              [PSCustomObject]@{
                  Close    = [math]::Round($LatestPrice, 2)
                  WeekPct  = Pct $MondayOpen
                  MonthPct = Pct ($N -ge 31  ? $Rows[30].close  : $Rows[$N-1].close)
                  SixMoPct = Pct ($N -ge 183 ? $Rows[182].close : $Rows[$N-1].close)
                  YearPct  = Pct ($N -ge 366 ? $Rows[365].close : $Rows[$N-1].close)
              }
          }

          function Get-CoinGeckoWeeklyData([string]$CoinId) {
              $R = Invoke-RestMethod `
                       -Uri "https://api.coingecko.com/api/v3/coins/$CoinId/market_chart?vs_currency=usd&days=31" `
                       -ErrorAction Stop
              $Points = @($R.prices | ForEach-Object {
                  [PSCustomObject]@{
                      Time  = [DateTimeOffset]::FromUnixTimeMilliseconds($_[0]).UtcDateTime
                      Price = [double]$_[1]
                  }
              } | Sort-Object Time -Descending)
              $N = $Points.Count
              if ($N -eq 0) { throw "CoinGecko: no data for $CoinId" }
              $LatestPrice = $Points[0].Price
              $MondayPrice = ($Points | Where-Object { $_.Time.DayOfWeek -eq 'Monday' } | Select-Object -First 1).Price
              $ThirtyDaysAgo = [DateTime]::UtcNow.AddDays(-30)
              $MonthPoint = ($Points | Where-Object { $_.Time -le $ThirtyDaysAgo } | Select-Object -First 1)
              if (-not $MondayPrice) { throw "CoinGecko: no Monday data for $CoinId" }
              function Pct($From) {
                  if (-not $From -or $From -eq 0) { return $null }
                  [math]::Round(($LatestPrice - $From) / $From * 100, 2)
              }
              [PSCustomObject]@{
                  Close    = [math]::Round($LatestPrice, 2)
                  WeekPct  = Pct $MondayPrice
                  MonthPct = Pct ($MonthPoint ? $MonthPoint.Price : $Points[$N-1].Price)
                  SixMoPct = $null
                  YearPct  = $null
              }
          }

          function Fmt([object]$v) {
              if ($null -eq $v) { return "N/A" }
              "$(if ($v -ge 0) { "+$v% 🟢" } else { "$v% 🔴" })"
          }

          function FmtFlat([object]$v) {
              if ($null -eq $v) { return "N/A" }
              "$(if ($v -ge 0) { '+' })$v%"
          }

          $lines = @(
              "<b>CRYPTO</b> — Weekly digest 📊"
              "<i>Monday open → latest close</i>"
              "<i>1M = 30 | 6M = 182 | 1Y = 365</i>"
              ""
          )

          $Results = @()
          foreach ($idx in $Indices) {
              $Flag = "💵"
              if ($idx.Source -ne "COINGECKO") { Start-Sleep -Seconds 15 }
              try {
                  $d = if ($idx.Source -eq "COINGECKO") { Get-CoinGeckoWeeklyData $idx.CoinId } else { Get-CryptoWeeklyData $idx.Ticker }
                  $Results += [PSCustomObject]@{
                      Name     = $idx.Name
                      Flag     = $Flag
                      Close    = $d.Close
                      WeekPct  = $d.WeekPct
                      MonthPct = $d.MonthPct
                      SixMoPct = $d.SixMoPct
                      YearPct  = $d.YearPct
                      Own      = $idx.Own
                  }
              } catch {
                  Write-Warning "[$($idx.Name)] $($_.Exception.Message)"
                  $Results += [PSCustomObject]@{
                      Name     = $idx.Name
                      Flag     = $Flag
                      Close    = $null
                      WeekPct  = $null
                      MonthPct = $null
                      SixMoPct = $null
                      YearPct  = $null
                      Own      = $idx.Own
                      Error    = $true
                      ErrorMsg = $_.Exception.Message
                  }
              }
          }

          $Results = $Results | Sort-Object -Property WeekPct -Descending

          foreach ($r in $Results) {
              $Portfolio = if ($r.Own) { '💼' } else { '' }
              if ($r.Error) {
                  $lines += "<b>$($r.Flag) $($r.Name)</b> — unavailable ⚠️$Portfolio"
                  $lines += "<i>Error: $($r.ErrorMsg)</i>"
              } else {
                  $lines += "<b>$($r.Flag) $($r.Name)</b> ($($r.Close)) <b>$(Fmt $r.WeekPct)</b> $Portfolio"
                  $lines += "<i>1M: $(FmtFlat $r.MonthPct) | 6M: $(FmtFlat $r.SixMoPct) | 1Y: $(FmtFlat $r.YearPct)</i>"
              }
          }

          $body = @{
              chat_id    = $env:TELEGRAM_CHAT_ID
              text       = ($lines -join "`n")
              parse_mode = "HTML"
          } | ConvertTo-Json -Depth 3

          Invoke-RestMethod -Uri "https://api.telegram.org/bot$($env:TELEGRAM_TOKEN)/sendMessage" `
              -Method Post -Body $body -ContentType "application/json; charset=utf-8"
          Write-Host "Crypto weekly digest sent."
