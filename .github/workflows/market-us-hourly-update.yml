name: market-us-hourly-update

on:
  workflow_dispatch: # Triggered externally on schedule via cron-job.org

jobs:
  send-update:
    runs-on: ubuntu-latest
    steps:
      - name: Send market update to Telegram
        shell: pwsh
        env:
          TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVEDATA_KEY:     ${{ secrets.TWELVEDATA_KEY }}
        run: |
          $TZ     = [System.TimeZoneInfo]::FindSystemTimeZoneById('Europe/Stockholm')
          $Now    = [System.TimeZoneInfo]::ConvertTimeFromUtc([DateTime]::UtcNow, $TZ)
          $Hour   = $Now.Hour
          $Min    = $Now.Minute
          $Dow    = $Now.DayOfWeek.ToString()
          $UsMarketOpen = ($Dow -notin @('Saturday','Sunday')) -and (
              ($Hour -eq 15 -and $Min -ge 30) -or
              ($Hour -gt 15 -and $Hour -lt 22)
          )


          $Indices = @(
              @{ Name = "S&P 500 (ETF)"; Ticker = "SPY";  Market = "US"; Own = $false }
              @{ Name = "DJI (ETF)";     Ticker = "DIA";  Market = "US"; Own = $false }
              @{ Name = "MSFT";     Ticker = "MSFT"; Market = "US"; Own = $true  }
          )

          function Get-IndexData([string]$Ticker, [string]$Market) {
              $Enc = [Uri]::EscapeDataString($Ticker)
              $R   = Invoke-RestMethod `
                         -Uri "https://api.twelvedata.com/quote?symbol=$Enc&apikey=$($env:TWELVEDATA_KEY)" `
                         -ErrorAction Stop
              if ($R.status -eq "error") { throw "TwelveData: $($R.message)" }
              [PSCustomObject]@{
                  Current = [math]::Round([double]$R.close, 2)
                  DayPct  = [math]::Round([double]$R.percent_change, 2)
              }
          }

          function Fmt([object]$v) {
              if ($null -eq $v) { return "N/A" }
              "$(if ($v -ge 0) { "(+$v%) 🟢" } else { "($v%) 🔴" })"
          }

          function FmtArrow([object]$v) {
              if ($null -eq $v) { return "N/A" }
              "$(if ($v -ge 0) { "(+$v%) ▲" } else { "($v%) ▼" })"
          }

          function Get-Lines($IdxList) {
              $out = @()
              foreach ($idx in $IdxList) {
                  try {
                      $d         = Get-IndexData $idx.Ticker $idx.Market
                      $Portfolio = if ($idx.Own) { '💼' } else { '' }
                      $out   += "<b>$($idx.Name)</b> $($d.Current) $(if ($UsMarketOpen) { Fmt $d.DayPct } else { FmtArrow $d.DayPct }) $Portfolio"
                  } catch {
                      $out   += "<b>$($idx.Name)</b> — unavailable ⚠️"
                      $out   += "<i>Error: $($_.Exception.Message)</i>"
                  }
              }
              return $out
          }

          $usStatus = if ($UsMarketOpen) { 'Open 🔔' } else { 'Closed 🔕' }

          $IsMarketClose = ($Hour -eq 22 -and $Min -eq 0)

          $lines = @()
          if ($IsMarketClose) {
              $lines += "<b>🔕 US Market Close 🔕 — <i>$($Now.ToString('yyyy-MM-dd HH:mm')) CET</i></b>"
              $lines += "US Market: $usStatus"
              $lines += ""
              $lines += Get-Lines $Indices
          }
          else {
              $lines += "<b>US</b> — Hourly update 📈"
              $lines += "$($Now.ToString('yyyy-MM-dd HH:mm')) CET"
              $lines += "<i>🇺🇸 $usStatus</i>"
              $lines += ""
              $lines += Get-Lines $Indices
          }

          $body = @{
              chat_id    = $env:TELEGRAM_CHAT_ID
              text       = ($lines -join "`n")
              parse_mode = "HTML"
          } | ConvertTo-Json -Depth 3

          Invoke-RestMethod -Uri "https://api.telegram.org/bot$($env:TELEGRAM_TOKEN)/sendMessage" `
              -Method Post -Body $body -ContentType "application/json; charset=utf-8"
          Write-Host "Sent at $($Now.ToString('HH:mm')) CET"