name: market-hourly-update

on:
  workflow_dispatch:

jobs:
  send-update:
    runs-on: ubuntu-latest
    steps:
      - name: Send market update to Telegram
        shell: pwsh
        env:
          TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVEDATA_KEY:     ${{ secrets.TWELVEDATA_KEY }}
        run: |
          $TZ     = [System.TimeZoneInfo]::FindSystemTimeZoneById('Europe/Stockholm')
          $Now    = [System.TimeZoneInfo]::ConvertTimeFromUtc([DateTime]::UtcNow, $TZ)
          $Hour   = $Now.Hour
          $Min    = $Now.Minute
          $Dow    = $Now.DayOfWeek.ToString()
          $UsMarketOpen = ($Dow -notin @('Saturday','Sunday')) -and (
              ($Hour -eq 15 -and $Min -ge 30) -or
              ($Hour -gt 15 -and $Hour -lt 22)
          )


          $Indices = @(
              @{ Name = "S&P 500 (ETF)"; Ticker = "SPY";  Market = "US" }
              @{ Name = "DJI (ETF)";     Ticker = "DIA";  Market = "US" }
              @{ Name = "Microsoft";     Ticker = "MSFT"; Market = "US" }
          )

          function Get-IndexData([string]$Ticker, [string]$Market) {
              $Year = $Now.Year.ToString()

              $Enc  = [Uri]::EscapeDataString($Ticker)
              $R    = Invoke-RestMethod `
                          -Uri "https://api.twelvedata.com/time_series?symbol=$Enc&interval=1day&outputsize=252&apikey=$($env:TWELVEDATA_KEY)" `
                          -ErrorAction Stop
              if ($R.status -eq "error") { throw "TwelveData: $($R.message)" }
              $Rows = @($R.values | ForEach-Object {
                  [PSCustomObject]@{ date = $_.datetime; close = [double]$_.close }
              })
              if ($Rows.Count -eq 0) { throw "No data returned for $Ticker" }

              $N   = $Rows.Count
              $Cur = $Rows[0].close
              $YtdClose = ($Rows | Where-Object { $_.date -like "$Year*" } | Select-Object -Last 1).close

              function Pct($From) {
                  if (-not $From -or $From -eq 0) { return $null }
                  [math]::Round(($Cur - $From) / $From * 100, 2)
              }

              $WeekIdx = 5

              [PSCustomObject]@{
                  Current  = [math]::Round($Cur, 2)
                  DayPct   = Pct $Rows[1].close
                  WeekPct  = Pct ($N -ge ($WeekIdx + 1) ? $Rows[$WeekIdx].close : $Rows[$N-1].close)
                  MonthPct = Pct ($N -ge 22 ? $Rows[21].close : $Rows[$N-1].close)
                  YtdPct   = Pct $YtdClose
              }
          }

          function Fmt([object]$v) {
              if ($null -eq $v) { return "N/A" }
              "$(if ($v -ge 0) { '🟢 +' } else { '🔴 ' })$v%"
          }

          function FmtArrow([object]$v) {
              if ($null -eq $v) { return "N/A" }
              "$(if ($v -ge 0) { '▲ +' } else { '▼ ' })$v%"
          }

          function Get-Lines($IdxList) {
              $out = @()
              foreach ($idx in $IdxList) {
                  try {
                      $d    = Get-IndexData $idx.Ticker $idx.Market
                      $Flag = switch ($idx.Market) {
                          "SE"  { "🇸🇪" }
                          "US"  { "🇺🇸" }
                          default { $idx.Market }
                      }
                      $out   += "<b>$Flag $($idx.Name)</b> — $($d.Current)"
                      $out   += "1D: $(if ($UsMarketOpen) { Fmt $d.DayPct } else { FmtArrow $d.DayPct }) | 1W: $(FmtArrow $d.WeekPct)"
                      $out   += "1M: $(FmtArrow $d.MonthPct) | YTD: $(FmtArrow $d.YtdPct)"
                  } catch {
                      $out   += "<b>$Flag $($idx.Name)</b> — unavailable ⚠️"
                      $out   += "  <i>Error: $($_.Exception.Message)</i>"
                  }
                  $out += ""
              }
              return $out
          }

          $usStatus = if ($UsMarketOpen) { 'Open 🔔' } else { 'Closed 🔕' }

          $IsMarketClose = ($Hour -eq 22 -and $Min -eq 0)

          $lines = @()
          if ($IsMarketClose) {
              $lines += "<b>🔕 US Market Close 🔕 — <i>$($Now.ToString('yyyy-MM-dd HH:mm')) CET</i></b>"
              $lines += "US Market: $usStatus"
              $lines += ""
              $lines += Get-Lines $Indices
          }
          else {
              $lines += "<b>US Market Update 📈</b>"
              $lines += "<i>$($Now.ToString('yyyy-MM-dd HH:mm')) CET</i>"
              $lines += "$usStatus"
              $lines += ""
              $lines += Get-Lines $Indices
          }

          $lines += "<u><i>Via GitHub, repo liars-bench</i></u>"

          $body = @{
              chat_id    = $env:TELEGRAM_CHAT_ID
              text       = ($lines -join "`n")
              parse_mode = "HTML"
          } | ConvertTo-Json -Depth 3

          Invoke-RestMethod -Uri "https://api.telegram.org/bot$($env:TELEGRAM_TOKEN)/sendMessage" `
              -Method Post -Body $body -ContentType "application/json; charset=utf-8"
          Write-Host "Sent at $($Now.ToString('HH:mm')) CET"