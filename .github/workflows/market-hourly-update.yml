name: Market Hourly Update

on:
  schedule:
    - cron: '0 7-21 * * 1-5'
    - cron: '30 15,16 * * 1-5'
  workflow_dispatch:

jobs:
  send-update:
    name: Send update
    runs-on: ubuntu-latest
    steps:
      - name: Send market update to Telegram
        shell: pwsh
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVEDATA_KEY:   ${{ secrets.TWELVEDATA_KEY }}
        run: |
          $TZ     = [System.TimeZoneInfo]::FindSystemTimeZoneById('Europe/Stockholm')
          $Now    = [System.TimeZoneInfo]::ConvertTimeFromUtc([DateTime]::UtcNow, $TZ)
          $Hour   = $Now.Hour
          $Min    = $Now.Minute
          $Dow    = $Now.DayOfWeek.ToString()

          if ($Dow -in @('Saturday','Sunday') -or $Hour -lt 9 -or
              $Hour -gt 22 -or ($Hour -eq 22 -and $Min -gt 0)) {
              Write-Host "Outside window ($Hour`:$($Min.ToString('00')) $Dow), skipping."
              exit 0
          }

          $Indices = @(
            @{ Name = "OMXS30 (XACT)"; Ticker = "XACTOMXS30.ST"; Market = "SE" }
            @{ Name = "S&P 500 (SPY)"; Ticker = "SPY";            Market = "US" }
            @{ Name = "Dow Jones (DIA)";Ticker = "DIA";            Market = "US" }
            @{ Name = "Microsoft";      Ticker = "MSFT";           Market = "US" }
            @{ Name = "Bitcoin";        Ticker = "BTC/USD";        Market = "CRYPTO" }
          )

          function Get-MarketStatus([string]$Market) {
              $T = $Hour * 60 + $Min
              if ($Market -eq "SE") {
                  if ($T -ge 540 -and $T -lt 1050) { return "Open" }
                  return "Closed"
              }
              if ($Market -eq "US") {
                  if ($T -lt 930)  { return "Opens at 15:30 CET" }
                  if ($T -lt 1320) { return "Open" }
                  return "Closed"
              }
              if ($Market -eq "CRYPTO") { return "Open 24/7" }
          }

          function Get-IndexData([string]$Ticker) {
              $Enc = [Uri]::EscapeDataString($Ticker)
              $R   = Invoke-RestMethod `
                         -Uri "https://api.twelvedata.com/time_series?symbol=$Enc&interval=1day&outputsize=252&apikey=$($env:TWELVEDATA_KEY)" `
                         -ErrorAction Stop

              if ($R.status -eq "error") { throw "Twelve Data: $($R.message)" }

              # values[0] = most recent, values[N-1] = oldest
              $Vals = $R.values
              $N    = $Vals.Count
              $Cur  = [double]$Vals[0].close

              function Pct($From) {
                  if (-not $From -or [double]$From -eq 0) { return $null }
                  [math]::Round(($Cur - [double]$From) / [double]$From * 100, 2)
              }

              # YTD: first trading day of current year
              $Year     = $Now.Year.ToString()
              $YtdClose = ($Vals | Where-Object { $_.datetime -like "$Year*" } | Select-Object -Last 1).close

              [PSCustomObject]@{
                  Current    = [math]::Round($Cur, 2)
                  DayPct     = Pct $Vals[1].close
                  WeekPct    = Pct ($N -ge 6  ? $Vals[5].close  : $Vals[$N-1].close)
                  MonthPct   = Pct ($N -ge 22 ? $Vals[21].close : $Vals[$N-1].close)
                  YtdPct     = Pct $YtdClose
                  LastUpdate = $Vals[0].datetime
              }
          }

          function Fmt([object]$v) {
              if ($null -eq $v) { return "N/A" }
              "$(if ($v -ge 0) { '▲ +' } else { '▼ ' })$v%"
          }

          function Get-Lines($IdxList) {
              $out = @()
              foreach ($idx in $IdxList) {
                  try {
                      $d      = Get-IndexData $idx.Ticker
                      $status = Get-MarketStatus $idx.Market
                      $out   += "*$($idx.Market): $($idx.Name)* — $($d.Current) [$status]"
                      $out   += "  Day: $(Fmt $d.DayPct) | Week: $(Fmt $d.WeekPct) | Month: $(Fmt $d.MonthPct) | YTD: $(Fmt $d.YtdPct)"
                  } catch {
                      $out   += "*$($idx.Market): $($idx.Name)* — unavailable ⚠️"
                  }
                  $out += ""
              }
              return $out
          }

          $SeIdx = @($Indices | Where-Object { $_.Market -eq "SE" })
          $UsIdx = @($Indices | Where-Object { $_.Market -eq "US" })

          $lines = @()
          if ($Hour -eq 9 -and $Min -eq 0) {
              $lines += "*🔔 SE Market Open — $($Now.ToString('yyyy-MM-dd HH:mm')) CET*"
              $lines += "_US market opens at 15:30 CET_"
              $lines += ""
              $lines += Get-Lines $SeIdx
          }
          elseif ($Hour -eq 17 -and $Min -eq 30) {
              $lines += "*🔕 SE Market Close — $($Now.ToString('yyyy-MM-dd HH:mm')) CET*"
              $lines += "_US market closes at 22:00 CET_"
              $lines += ""
              $lines += Get-Lines $SeIdx
          }
          elseif ($Hour -eq 22 -and $Min -eq 0) {
              $lines += "*🔕 US Market Close — $($Now.ToString('yyyy-MM-dd HH:mm')) CET*"
              $lines += ""
              $lines += Get-Lines $UsIdx
          }
          else {
              $lines += "*📈 Market Update — $($Now.ToString('yyyy-MM-dd HH:mm')) CET*"
              $lines += ""
              $lines += Get-Lines $Indices
          }

          $body = @{
              chat_id    = $env:TELEGRAM_CHAT_ID
              text       = ($lines -join "`n")
              parse_mode = "Markdown"
          } | ConvertTo-Json -Depth 3

          Invoke-RestMethod -Uri "https://api.telegram.org/bot$($env:TELEGRAM_TOKEN)/sendMessage" `
              -Method Post -Body $body -ContentType "application/json; charset=utf-8"
          Write-Host "Sent at $($Now.ToString('HH:mm')) CET"
