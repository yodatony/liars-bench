name: Market Hourly Update

on:
  schedule:
    - cron: '0 7-21 * * 1-5'    # Every hour — covers 09:00–22:00 in both CET and CEST
    - cron: '30 15,16 * * 1-5'  # 17:30 CEST (15:30 UTC) and 17:30 CET (16:30 UTC) — SE close
  workflow_dispatch:

jobs:
  send-update:
    name: Send update
    runs-on: ubuntu-latest
    steps:
      - name: Send market update to Telegram
        shell: pwsh
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          $TZ     = [System.TimeZoneInfo]::FindSystemTimeZoneById('Europe/Stockholm')
          $Now    = [System.TimeZoneInfo]::ConvertTimeFromUtc([DateTime]::UtcNow, $TZ)
          $Hour   = $Now.Hour
          $Min    = $Now.Minute
          $Dow    = $Now.DayOfWeek.ToString()

          # Guard: weekdays 09:00–22:00 CET/CEST only
          if ($Dow -in @('Saturday','Sunday') -or $Hour -lt 9 -or
              $Hour -gt 22 -or ($Hour -eq 22 -and $Min -gt 0)) {
              Write-Host "Outside window ($Hour`:$($Min.ToString('00')) $Dow), skipping."
              exit 0
          }

          # Establish Yahoo Finance session and get crumb
          $YFSession = New-Object Microsoft.PowerShell.Commands.WebRequestSession
          $YFSession.Headers.Add("User-Agent", "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124.0 Safari/537.36")
          Invoke-WebRequest -Uri "https://finance.yahoo.com" -WebSession $YFSession -UseBasicParsing | Out-Null
          $Crumb = (Invoke-RestMethod -Uri "https://query1.finance.yahoo.com/v1/test/getcrumb" `
              -WebSession $YFSession -ErrorAction Stop).Trim()
          Write-Host "Crumb acquired: $Crumb"

          $Indices = @(
              @{ Name = "OMXS30";    Ticker = "^OMX";    Market = "SE" }
              @{ Name = "OMXSPI";    Ticker = "^OMXSPI"; Market = "SE" }
              @{ Name = "S&P 500";   Ticker = "^GSPC";   Market = "US" }
              @{ Name = "Dow Jones"; Ticker = "^DJI";    Market = "US" }
              @{ Name = "Microsoft"; Ticker = "MSFT";    Market = "US" }
              @{ Name = "Bitcoin";   Ticker = "BTC-USD";  Market = "CRYPTO" }
          )

          function Get-MarketStatus([string]$Market) {
              $T = $Hour * 60 + $Min
              if ($Market -eq "SE") {
                  if ($T -ge 540 -and $T -lt 1050) { return "Open" }
                  return "Closed"
              }
              if ($Market -eq "US") {
                  if ($T -lt 930)  { return "Opens at 15:30 CET" }
                  if ($T -lt 1320) { return "Open" }
                  return "Closed"
              }
              if ($Market -eq "CRYPTO") { return "Open 24/7" }
          }

          function Get-IndexData([string]$Ticker) {
              $Enc  = [Uri]::EscapeDataString($Ticker)
              $R    = Invoke-RestMethod `
                          -Uri "https://query1.finance.yahoo.com/v8/finance/chart/$Enc?range=ytd&interval=1d&crumb=$Crumb" `
                          -WebSession $YFSession -ErrorAction Stop
              $Meta = $R.chart.result[0].meta
              $Cls  = $R.chart.result[0].indicators.quote[0].close | Where-Object { $null -ne $_ }
              $N    = $Cls.Count
              $Cur  = $Meta.regularMarketPrice

              $LastUtc = [DateTimeOffset]::FromUnixTimeSeconds($Meta.regularMarketTime).UtcDateTime
              $AgeMin  = ([DateTime]::UtcNow - $LastUtc).TotalMinutes
              $LastCet = [System.TimeZoneInfo]::ConvertTimeFromUtc($LastUtc, $TZ)

              function Pct($From) {
                  if (-not $From -or $From -eq 0) { return $null }
                  [math]::Round(($Cur - $From) / $From * 100, 2)
              }

              [PSCustomObject]@{
                  Current    = [math]::Round($Cur, 2)
                  DayPct     = [math]::Round($Meta.regularMarketChangePercent, 2)
                  WeekPct    = Pct ($N -ge 6  ? $Cls[$N-6]  : $Cls[0])
                  MonthPct   = Pct ($N -ge 22 ? $Cls[$N-22] : $Cls[0])
                  YtdPct     = Pct $Cls[0]
                  IsStale    = $AgeMin -gt 60
                  LastUpdate = $LastCet.ToString('HH:mm')
              }
          }

          function Fmt([object]$v) {
              if ($null -eq $v) { return "N/A" }
              "$(if ($v -ge 0) { '▲ +' } else { '▼ ' })$v%"
          }

          function Get-Lines($IdxList) {
              $out = @()
              foreach ($idx in $IdxList) {
                  try {
                      $d      = Get-IndexData $idx.Ticker
                      $status = Get-MarketStatus $idx.Market
                      $stale  = if ($d.IsStale) { " _(last price: $($d.LastUpdate))_" } else { "" }
                      $out   += "*$($idx.Market): $($idx.Name)* — $($d.Current)$stale [$status]"
                      $out   += "  Day: $(Fmt $d.DayPct) | Week: $(Fmt $d.WeekPct) | Month: $(Fmt $d.MonthPct) | YTD: $(Fmt $d.YtdPct)"
                  } catch {
                      $out   += "*$($idx.Market): $($idx.Name)* — unavailable ⚠️"
                  }
                  $out += ""
              }
              return $out
          }

          $SeIdx = @($Indices | Where-Object { $_.Market -eq "SE" })
          $UsIdx = @($Indices | Where-Object { $_.Market -eq "US" })

          $lines = @()
          if ($Hour -eq 9 -and $Min -eq 0) {
              $lines += "*🔔 SE Market Open — $($Now.ToString('yyyy-MM-dd HH:mm')) CET*"
              $lines += "_US market opens at 15:30 CET_"
              $lines += ""
              $lines += Get-Lines $SeIdx
          }
          elseif ($Hour -eq 17 -and $Min -eq 30) {
              $lines += "*🔕 SE Market Close — $($Now.ToString('yyyy-MM-dd HH:mm')) CET*"
              $lines += "_US market closes at 22:00 CET_"
              $lines += ""
              $lines += Get-Lines $SeIdx
          }
          elseif ($Hour -eq 22 -and $Min -eq 0) {
              $lines += "*🔕 US Market Close — $($Now.ToString('yyyy-MM-dd HH:mm')) CET*"
              $lines += ""
              $lines += Get-Lines $UsIdx
          }
          else {
              $lines += "*📈 Market Update — $($Now.ToString('yyyy-MM-dd HH:mm')) CET*"
              $lines += ""
              $lines += Get-Lines $Indices
          }

          $body = @{
              chat_id    = $env:TELEGRAM_CHAT_ID
              text       = ($lines -join "`n")
              parse_mode = "Markdown"
          } | ConvertTo-Json -Depth 3

          Invoke-RestMethod -Uri "https://api.telegram.org/bot$($env:TELEGRAM_TOKEN)/sendMessage" `
              -Method Post -Body $body -ContentType "application/json; charset=utf-8"
          Write-Host "Sent at $($Now.ToString('HH:mm')) CET"
