name: Market Hourly Update

on:
  schedule:
    - cron: '0 8-22 * * 1-5'    # 10:00–00:00 CEST (UTC+2) / 09:00–23:00 CET (UTC+1)
  workflow_dispatch:

jobs:
  send-update:
    name: Send update
    runs-on: ubuntu-latest
    steps:
      - name: Send market update to Telegram
        shell: pwsh
        env:
          TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          $TZ     = [System.TimeZoneInfo]::FindSystemTimeZoneById('Europe/Stockholm')
          $Now    = [System.TimeZoneInfo]::ConvertTimeFromUtc([DateTime]::UtcNow, $TZ)
          $Hour   = $Now.Hour
          $Min    = $Now.Minute
          $Dow    = $Now.DayOfWeek.ToString()


          $Indices = @(
              @{ Name = "OMXS30";           Ticker = "^omx";    Market = "SE";     Source = "Stooq" }
              @{ Name = "OMXSPI";           Ticker = "^omxspi"; Market = "SE";     Source = "Stooq" }
              @{ Name = "S&P 500 (ETF $)";  Ticker = "spy.us";  Market = "US";     Source = "Stooq" }
              @{ Name = "Dow Jones (ETF $)"; Ticker = "dia.us";  Market = "US";     Source = "Stooq" }
              @{ Name = "Microsoft";        Ticker = "msft.us"; Market = "US";     Source = "Stooq" }
              @{ Name = "Bitcoin";          Ticker = "btcusd";  Market = "CRYPTO"; Source = "Stooq" }
          )
          $SeIdx = @($Indices | Where-Object { $_.Market -eq "SE" })
          $UsIdx = @($Indices | Where-Object { $_.Market -eq "US" })

          function Get-MarketStatus([string]$Market) {
              $T = $Hour * 60 + $Min
              if ($Market -eq "SE") {
                  if ($T -ge 540 -and $T -lt 1050) { return "Open" }
                  return "Closed"
              }
              if ($Market -eq "US") {
                  if ($T -lt 930)  { return "Opens at 15:30 CET" }
                  if ($T -lt 1320) { return "Open" }
                  return "Closed"
              }
              if ($Market -eq "CRYPTO") { return "Open 24/7" }
          }

          function Get-IndexData([string]$Ticker, [string]$Source) {
              $Year = $Now.Year.ToString()

              $Enc  = [Uri]::EscapeDataString($Ticker)
              $Csv  = Invoke-RestMethod -Uri "https://stooq.com/q/d/l/?s=$Enc&i=d" `
                          -Headers @{ 'User-Agent' = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36' } `
                          -ErrorAction Stop
              $Rows = @(($Csv -split "`n") | Where-Object { $_ -match "^\d{4}" } | ForEach-Object {
                  $c = $_ -split ","
                  [PSCustomObject]@{ date = $c[0]; close = [double]$c[4] }
              } | Sort-Object date -Descending

              $N   = $Rows.Count
              $Cur = $Rows[0].close
              $YtdClose = ($Rows | Where-Object { $_.date -like "$Year*" } | Select-Object -Last 1).close

              function Pct($From) {
                  if (-not $From -or $From -eq 0) { return $null }
                  [math]::Round(($Cur - $From) / $From * 100, 2)
              }

              [PSCustomObject]@{
                  Current  = [math]::Round($Cur, 2)
                  DayPct   = Pct $Rows[1].close
                  WeekPct  = Pct ($N -ge 6  ? $Rows[5].close  : $Rows[$N-1].close)
                  MonthPct = Pct ($N -ge 22 ? $Rows[21].close : $Rows[$N-1].close)
                  YtdPct   = Pct $YtdClose
              }
          }

          function Fmt([object]$v) {
              if ($null -eq $v) { return "N/A" }
              "$(if ($v -ge 0) { '▲ +' } else { '▼ ' })$v%"
          }

          function Get-Lines($IdxList) {
              $out = @()
              foreach ($idx in $IdxList) {
                  try {
                      $d      = Get-IndexData $idx.Ticker $idx.Source
                      $status = Get-MarketStatus $idx.Market
                      $out   += "*$($idx.Market): $($idx.Name)* — $($d.Current) [$status]"
                      $out   += "  Day: $(Fmt $d.DayPct) | Week: $(Fmt $d.WeekPct) | Month: $(Fmt $d.MonthPct) | YTD: $(Fmt $d.YtdPct)"
                  } catch {
                      $out   += "*$($idx.Market): $($idx.Name)* — unavailable ⚠️"
                      $out   += "  _Error: $($_.Exception.Message)_"
                  }
                  $out += ""
              }
              return $out
          }

          $lines = @()
          if ($Hour -eq 9 -and $Min -eq 0) {
              $lines += "*🔔 SE Market Open — $($Now.ToString('yyyy-MM-dd HH:mm')) CET*"
              $lines += "_US market opens at 15:30 CET_"
              $lines += ""
              $lines += Get-Lines $Indices
          }
          elseif ($Hour -eq 17 -and $Min -eq 30) {
              $lines += "*🔕 SE Market Close — $($Now.ToString('yyyy-MM-dd HH:mm')) CET*"
              $lines += "_US market closes at 22:00 CET_"
              $lines += ""
              $lines += Get-Lines $Indices
          }
          elseif ($Hour -eq 22 -and $Min -eq 0) {
              $lines += "*🔕 US Market Close — $($Now.ToString('yyyy-MM-dd HH:mm')) CET*"
              $lines += ""
              $lines += Get-Lines $Indices
          }
          else {
              $lines += "*📈 Market Update — $($Now.ToString('yyyy-MM-dd HH:mm')) CET*"
              $lines += ""
              $lines += Get-Lines $Indices
          }

          $body = @{
              chat_id    = $env:TELEGRAM_CHAT_ID
              text       = ($lines -join "`n")
              parse_mode = "Markdown"
          } | ConvertTo-Json -Depth 3

          Invoke-RestMethod -Uri "https://api.telegram.org/bot$($env:TELEGRAM_TOKEN)/sendMessage" `
              -Method Post -Body $body -ContentType "application/json; charset=utf-8"
          Write-Host "Sent at $($Now.ToString('HH:mm')) CET"
