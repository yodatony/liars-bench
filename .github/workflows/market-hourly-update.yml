name: market-hourly-update

on:
  workflow_dispatch:

jobs:
  send-update:
    runs-on: ubuntu-latest
    steps:
      - name: Send market update to Telegram
        shell: pwsh
        env:
          TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVEDATA_KEY:     ${{ secrets.TWELVEDATA_KEY }}
        run: |
          $TZ     = [System.TimeZoneInfo]::FindSystemTimeZoneById('Europe/Stockholm')
          $Now    = [System.TimeZoneInfo]::ConvertTimeFromUtc([DateTime]::UtcNow, $TZ)
          $Hour   = $Now.Hour
          $Min    = $Now.Minute
          $Dow    = $Now.DayOfWeek.ToString()


          $Indices = @(
              @{ Name = "S&P 500";          Ticker = "SPY";  Market = "US";     Source = "TwelveData"; Multiplier = 10; Decimals = 1 }
              @{ Name = "DJUS";  Ticker = "IYY";  Market = "US";     Source = "TwelveData"; Multiplier = 10; Decimals = 1 }
              @{ Name = "DJI"; Ticker = "DIA";  Market = "US";     Source = "TwelveData"; Multiplier = 100; Decimals = 0 }
              @{ Name = "Microsoft";                Ticker = "MSFT"; Market = "US";     Source = "TwelveData"; Multiplier = 1; Decimals = 2 }
              @{ Name = "Bitcoin";                  Ticker = "BTC/USD"; Market = "CRYPTO"; Source = "TwelveData"; Multiplier = 1; Decimals = 2 }
          )

          function Get-MarketStatus([string]$Market) {
              $T = $Hour * 60 + $Min
              if ($Market -eq "SE") {
                  if ($T -ge 540 -and $T -lt 1050) { return "Open" }
                  return "Closed"
              }
              if ($Market -eq "US") {
                  if ($T -lt 930)  { return "Opens at 15:30 CET" }
                  if ($T -lt 1320) { return "Open" }
                  return "Closed"
              }
              if ($Market -eq "CRYPTO") { return "Open 24/7" }
          }

          function Get-IndexData([string]$Ticker, [string]$Source, [int]$Multiplier = 1, [int]$Decimals = 2) {
              $Year = $Now.Year.ToString()

              $Enc  = [Uri]::EscapeDataString($Ticker)
              $R    = Invoke-RestMethod `
                          -Uri "https://api.twelvedata.com/time_series?symbol=$Enc&interval=1day&outputsize=252&apikey=$($env:TWELVEDATA_KEY)" `
                          -ErrorAction Stop
              if ($R.status -eq "error") { throw "TwelveData: $($R.message)" }
              $Rows = @($R.values | ForEach-Object {
                  [PSCustomObject]@{ date = $_.datetime; close = [double]$_.close }
              })
              if ($Rows.Count -eq 0) { throw "No data returned for $Ticker" }

              $N   = $Rows.Count
              $Cur = $Rows[0].close
              $YtdClose = ($Rows | Where-Object { $_.date -like "$Year*" } | Select-Object -Last 1).close

              function Pct($From) {
                  if (-not $From -or $From -eq 0) { return $null }
                  [math]::Round(($Cur - $From) / $From * 100, 2)
              }

              [PSCustomObject]@{
                  Current  = [math]::Round($Cur * $Multiplier, $Decimals)
                  DayPct   = Pct $Rows[1].close
                  WeekPct  = Pct ($N -ge 6  ? $Rows[5].close  : $Rows[$N-1].close)
                  MonthPct = Pct ($N -ge 22 ? $Rows[21].close : $Rows[$N-1].close)
                  YtdPct   = Pct $YtdClose
              }
          }

          function Fmt([object]$v) {
              if ($null -eq $v) { return "N/A" }
              "$(if ($v -ge 0) { '🟢 +' } else { '🔴 ' })$v%"
          }

          function FmtArrow([object]$v) {
              if ($null -eq $v) { return "N/A" }
              "$(if ($v -ge 0) { '▲ +' } else { '▼ ' })$v%"
          }

          function Get-Lines($IdxList) {
              $out = @()
              foreach ($idx in $IdxList) {
                  try {
                      $d      = Get-IndexData $idx.Ticker $idx.Source $idx.Multiplier $idx.Decimals
                      $status = Get-MarketStatus $idx.Market
                      $out   += "<b>$($idx.Market): $($idx.Name)</b> — $($d.Current) [$status]"
                      $out   += "<b>Day: $(Fmt $d.DayPct)</b> | Week: $(FmtArrow $d.WeekPct) | Month: $(FmtArrow $d.MonthPct) | YTD: $(FmtArrow $d.YtdPct)"
                  } catch {
                      $out   += "<b>$($idx.Market): $($idx.Name)</b> — unavailable ⚠️"
                      $out   += "  <i>Error: $($_.Exception.Message)</i>"
                  }
                  $out += ""
              }
              return $out
          }

          $lines = @()
          if ($Hour -eq 9 -and $Min -eq 0) {
              $lines += "<b>🔔 SE Market Open — $($Now.ToString('yyyy-MM-dd HH:mm')) CET</b>"
              $lines += "<i>US market opens at 15:30 CET</i>"
              $lines += ""
              $lines += Get-Lines $Indices
          }
          elseif ($Hour -eq 17 -and $Min -eq 30) {
              $lines += "<b>🔕 SE Market Close — $($Now.ToString('yyyy-MM-dd HH:mm')) CET</b>"
              $lines += "<i>US market closes at 22:00 CET</i>"
              $lines += ""
              $lines += Get-Lines $Indices
          }
          elseif ($Hour -eq 22 -and $Min -eq 0) {
              $lines += "<b>🔕 US Market Close — $($Now.ToString('yyyy-MM-dd HH:mm')) CET</b>"
              $lines += ""
              $lines += Get-Lines $Indices
          }
          else {
              $lines += "<b>📈 Market Update</b>"
              $lines += "$($Now.ToString('yyyy-MM-dd HH:mm')) CET"
              $lines += ""
              $lines += Get-Lines $Indices
          }

          $lines += "<u><i>repo liars-bench</i></u>"

          $body = @{
              chat_id    = $env:TELEGRAM_CHAT_ID
              text       = ($lines -join "`n")
              parse_mode = "HTML"
          } | ConvertTo-Json -Depth 3

          Invoke-RestMethod -Uri "https://api.telegram.org/bot$($env:TELEGRAM_TOKEN)/sendMessage" `
              -Method Post -Body $body -ContentType "application/json; charset=utf-8"
          Write-Host "Sent at $($Now.ToString('HH:mm')) CET"
