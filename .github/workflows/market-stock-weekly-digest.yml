name: market-stock-weekly-digest

on:
  workflow_dispatch:
  schedule:
    - cron: '57 10 * * 0'

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Send weekly digest
        shell: pwsh
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVEDATA_KEY:   ${{ secrets.TWELVEDATA_KEY }}
          EODHD_KEY:        ${{ secrets.EODHD_KEY }}
        run: |
          $TZ  = [System.TimeZoneInfo]::FindSystemTimeZoneById('Europe/Stockholm')
          $Now = [System.TimeZoneInfo]::ConvertTimeFromUtc([DateTime]::UtcNow, $TZ)

          $Indices = @(
              @{ Name = "ATCO B";           Ticker = "ATCO-B.ST"; Market = "SE"; Own = $true  }
              @{ Name = "INVE B";           Ticker = "INVE-B.ST"; Market = "SE"; Own = $true  }
              @{ Name = "VOLV B";           Ticker = "VOLV-B.ST"; Market = "SE"; Own = $false }
              @{ Name = "SAAB B";           Ticker = "SAAB-B.ST"; Market = "SE"; Own = $false }
              @{ Name = "SWED A";           Ticker = "SWED-A.ST"; Market = "SE"; Own = $false }
              @{ Name = "SHB A";            Ticker = "SHB-A.ST";  Market = "SE"; Own = $false }
              @{ Name = "SBB B";            Ticker = "SBB-B.ST";  Market = "SE"; Own = $false }
              @{ Name = "SSAB B";           Ticker = "SSAB-B.ST"; Market = "SE"; Own = $false }
              @{ Name = "Novo B";           Ticker = "NOVO-B.CO"; Market = "DK"; Own = $true  }
              @{ Name = "NVDA";             Ticker = "NVDA";      Market = "US"; Own = $false }
              @{ Name = "AAPL";             Ticker = "AAPL";      Market = "US"; Own = $false }
              @{ Name = "MSFT";             Ticker = "MSFT";      Market = "US"; Own = $true  }
              @{ Name = "AMZN";             Ticker = "AMZN";      Market = "US"; Own = $false }
              @{ Name = "GOOGL";            Ticker = "GOOGL";     Market = "US"; Own = $false }
              @{ Name = "TSLA";             Ticker = "TSLA";      Market = "US"; Own = $false }
          )

          function Get-WeeklyData([string]$Ticker) {
              $Enc  = [Uri]::EscapeDataString($Ticker)
              $R    = Invoke-RestMethod `
                          -Uri "https://api.twelvedata.com/time_series?symbol=$Enc&interval=1day&outputsize=22&apikey=$($env:TWELVEDATA_KEY)" `
                          -ErrorAction Stop
              if ($R.status -eq "error") { throw "Twelve Data: $($R.message)" }
              $Rows = @($R.values | ForEach-Object {
                  [PSCustomObject]@{ date = $_.datetime; close = [double]$_.close }
              })
              $N    = $Rows.Count
              $Last = $Rows[0].close
              $WkAgo  = $N -ge 6 ? $Rows[5].close : $Rows[$N-1].close

              function Pct($From) {
                  if (-not $From -or $From -eq 0) { return $null }
                  [math]::Round(($Last - $From) / $From * 100, 2)
              }

              [PSCustomObject]@{
                  Close    = [math]::Round($Last, 2)
                  WeekPct  = Pct $WkAgo
                  MonthPct = Pct ($N -ge 22 ? $Rows[21].close : $Rows[$N-1].close)
              }
          }

          function Get-SeWeeklyData([string]$Ticker) {
              $Enc  = [Uri]::EscapeDataString($Ticker)
              $Raw  = Invoke-RestMethod `
                          -Uri "https://eodhd.com/api/eod/$Enc`?api_token=$($env:EODHD_KEY)&fmt=json&order=d&limit=22" `
                          -ErrorAction Stop
              if (-not $Raw -or $Raw.Count -eq 0) { throw "No data returned for $Ticker" }
              $Rows = @($Raw | ForEach-Object {
                  [PSCustomObject]@{ date = $_.date; close = [double]$_.close }
              })
              $N    = $Rows.Count
              $Last = $Rows[0].close
              $WkAgo  = $N -ge 6 ? $Rows[5].close : $Rows[$N-1].close

              function Pct($From) {
                  if (-not $From -or $From -eq 0) { return $null }
                  [math]::Round(($Last - $From) / $From * 100, 2)
              }

              [PSCustomObject]@{
                  Close    = [math]::Round($Last, 2)
                  WeekPct  = Pct $WkAgo
                  MonthPct = Pct ($N -ge 22 ? $Rows[21].close : $Rows[$N-1].close)
              }
          }

          function Fmt([object]$v) {
              if ($null -eq $v) { return "N/A" }
              "$(if ($v -ge 0) { "(+$v%) 🟢" } else { "($v%) 🔴" })"
          }

          function FmtFlat([object]$v) {
              if ($null -eq $v) { return "N/A" }
              "$(if ($v -ge 0) { '+' })$v%"
          }

          $lines = @(
              "<b>STOCK</b> — Weekly digest 📊"
              "Last 5 trading days"
              "<i>1M = 21 trading days</i>"
              ""
          )

          $Results = @()
          foreach ($idx in $Indices) {
              $Flag = switch ($idx.Market) {
                  "SE"     { "🇸🇪" }
                  "DK"     { "🇩🇰" }
                  "US"     { "🇺🇸" }
                  default  { $idx.Market }
              }
              try {
                  $d = switch ($idx.Market) {
                      { $_ -in @("SE","DK") } { Get-SeWeeklyData $idx.Ticker }
                      default                { Get-WeeklyData $idx.Ticker }
                  }
                  $Results += [PSCustomObject]@{
                      Name     = $idx.Name
                      Flag     = $Flag
                      Close    = $d.Close
                      WeekPct  = $d.WeekPct
                      MonthPct = $d.MonthPct
                      Own      = $idx.Own
                  }
              } catch {
                  $Results += [PSCustomObject]@{
                      Name     = $idx.Name
                      Flag     = $Flag
                      Close    = $null
                      WeekPct  = $null
                      MonthPct = $null
                      Own      = $idx.Own
                      Error    = $true
                  }
              }
          }

          $Results = $Results | Sort-Object -Property WeekPct -Descending

          foreach ($r in $Results) {
              $Portfolio = if ($r.Own) { '💼' } else { '' }
              if ($r.Error) {
                  $lines += "<b>$($r.Flag) $($r.Name)</b> — unavailable ⚠️$Portfolio"
              } else {
                  $lines += "<b>$($r.Flag) $($r.Name)</b> $($r.Close) $(Fmt $r.WeekPct) $Portfolio"
                  $lines += "<i>1M: $(FmtFlat $r.MonthPct)</i>"
              }
          }

          $body = @{
              chat_id    = $env:TELEGRAM_CHAT_ID
              text       = ($lines -join "`n")
              parse_mode = "HTML"
          } | ConvertTo-Json -Depth 3

          Invoke-RestMethod -Uri "https://api.telegram.org/bot$($env:TELEGRAM_TOKEN)/sendMessage" `
              -Method Post -Body $body -ContentType "application/json; charset=utf-8"
          Write-Host "Weekly digest sent."
