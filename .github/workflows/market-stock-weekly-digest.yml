name: market-stock-weekly-digest

on:
  workflow_dispatch:
  schedule:
    - cron: '57 10 * * 0'

jobs:
  weekly-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Send weekly digest
        shell: pwsh
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVEDATA_KEY:   ${{ secrets.TWELVEDATA_KEY }}
          EODHD_KEY:        ${{ secrets.EODHD_KEY }}
        run: |
          $TZ  = [System.TimeZoneInfo]::FindSystemTimeZoneById('Europe/Stockholm')
          $Now = [System.TimeZoneInfo]::ConvertTimeFromUtc([DateTime]::UtcNow, $TZ)

          $Indices = @(
              @{ Name = "Atlas Copco B";   Ticker = "ATCO-B.ST"; Market = "SE"; Own = $true  }
              @{ Name = "Investor B";      Ticker = "INVE-B.ST"; Market = "SE"; Own = $true  }
              @{ Name = "Volvo B";         Ticker = "VOLV-B.ST"; Market = "SE"; Own = $false }
              @{ Name = "SAAB B";          Ticker = "SAAB-B.ST"; Market = "SE"; Own = $false }
              @{ Name = "Swedbank A";      Ticker = "SWED-A.ST"; Market = "SE"; Own = $false }
              @{ Name = "Handelsbanken A"; Ticker = "SHB-A.ST";  Market = "SE"; Own = $false }
              @{ Name = "SBB Norden B";    Ticker = "SBB-B.ST";  Market = "SE"; Own = $false }
              @{ Name = "SSAB B";          Ticker = "SSAB-B.ST"; Market = "SE"; Own = $false }
              @{ Name = "Novo Nordisk B";  Ticker = "NOVO-B.CO"; Market = "DK"; Own = $true  }
              @{ Name = "NVIDIA";          Ticker = "NVDA";      Market = "US"; Own = $false }
              @{ Name = "Apple";           Ticker = "AAPL";      Market = "US"; Own = $false }
              @{ Name = "Microsoft";       Ticker = "MSFT";      Market = "US"; Own = $true  }
              @{ Name = "Amazon";          Ticker = "AMZN";      Market = "US"; Own = $false }
              @{ Name = "Google A";        Ticker = "GOOGL";     Market = "US"; Own = $false }
              @{ Name = "Tesla";           Ticker = "TSLA";      Market = "US"; Own = $false }
          )

          function Get-WeeklyData([string]$Ticker) {
              $Enc  = [Uri]::EscapeDataString($Ticker)
              $R    = Invoke-RestMethod `
                          -Uri "https://api.twelvedata.com/time_series?symbol=$Enc&interval=1day&outputsize=252&apikey=$($env:TWELVEDATA_KEY)" `
                          -ErrorAction Stop
              if ($R.status -eq "error") { throw "Twelve Data: $($R.message)" }
              # values[0] = most recent
              $Vals  = $R.values
              $N     = $Vals.Count
              $Last  = [double]$Vals[0].close
              $WkAgo = [double]($N -ge 6 ? $Vals[5].close : $Vals[$N-1].close)

              function Pct($From) {
                  if (-not $From -or $From -eq 0) { return $null }
                  [math]::Round(($Last - $From) / $From * 100, 2)
              }

              [PSCustomObject]@{
                  Close   = [math]::Round($Last, 2)
                  WeekPct = Pct $WkAgo
              }
          }

          function Get-SeWeeklyData([string]$Ticker) {
              $Enc = [Uri]::EscapeDataString($Ticker)
              $Raw = Invoke-RestMethod `
                         -Uri "https://eodhd.com/api/eod/$Enc`?api_token=$($env:EODHD_KEY)&fmt=json&order=d&limit=252" `
                         -ErrorAction Stop
              if (-not $Raw -or $Raw.Count -eq 0) { throw "No data returned for $Ticker" }
              $N     = $Raw.Count
              $Last  = [double]$Raw[0].close
              $WkAgo = [double]($N -ge 6 ? $Raw[5].close : $Raw[$N-1].close)

              function Pct($From) {
                  if (-not $From -or $From -eq 0) { return $null }
                  [math]::Round(($Last - $From) / $From * 100, 2)
              }

              [PSCustomObject]@{
                  Close   = [math]::Round($Last, 2)
                  WeekPct = Pct $WkAgo
              }
          }

          function Fmt([object]$v) {
              if ($null -eq $v) { return "N/A" }
              "$(if ($v -ge 0) { '🟢 +' } else { '🔴 ' })$v%"
          }

          $LastFriday = $Now.AddDays(-2).ToString('yyyy-MM-dd')

          $lines = @(
              "<b>Weekly Stock Market Digest 📊</b>"
              "Week ending Friday $LastFriday"
              "<i>This week's movement</i>"
              ""
          )

          $Results = @()
          foreach ($idx in $Indices) {
              $Flag = switch ($idx.Market) {
                  "SE"     { "🇸🇪" }
                  "DK"     { "🇩🇰" }
                  "US"     { "🇺🇸" }
                  default  { $idx.Market }
              }
              try {
                  $d = switch ($idx.Market) {
                      { $_ -in @("SE","DK") } { Get-SeWeeklyData $idx.Ticker }
                      default                { Get-WeeklyData $idx.Ticker }
                  }
                  $Results += [PSCustomObject]@{
                      Name    = $idx.Name
                      Flag    = $Flag
                      Close   = $d.Close
                      WeekPct = $d.WeekPct
                      Own     = $idx.Own
                  }
              } catch {
                  $Results += [PSCustomObject]@{
                      Name    = $idx.Name
                      Flag    = $Flag
                      Close   = $null
                      WeekPct = $null
                      Own     = $idx.Own
                      Error   = $true
                  }
              }
          }

          $Results = $Results | Sort-Object -Property WeekPct -Descending

          foreach ($r in $Results) {
              $Portfolio = if ($r.Own) { ' 💼' } else { '' }
              if ($r.Error) {
                  $lines += "<b>$($r.Flag) $($r.Name)</b> — unavailable ⚠️$Portfolio"
              } else {
                  $lines += "<b>$($r.Flag) $($r.Name)</b> — $($r.Close) $(Fmt $r.WeekPct)$Portfolio"
              }
          }

          $body = @{
              chat_id    = $env:TELEGRAM_CHAT_ID
              text       = ($lines -join "`n")
              parse_mode = "HTML"
          } | ConvertTo-Json -Depth 3

          Invoke-RestMethod -Uri "https://api.telegram.org/bot$($env:TELEGRAM_TOKEN)/sendMessage" `
              -Method Post -Body $body -ContentType "application/json; charset=utf-8"
          Write-Host "Weekly digest sent."
