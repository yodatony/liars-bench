name: market-index-weekly-digest

on:
  workflow_dispatch:
  schedule:
    - cron: '53 10 * * 0'

jobs:
  weekly-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Send weekly digest
        shell: pwsh
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVEDATA_KEY:   ${{ secrets.TWELVEDATA_KEY }}
          EODHD_KEY:        ${{ secrets.EODHD_KEY }}
        run: |
          $TZ  = [System.TimeZoneInfo]::FindSystemTimeZoneById('Europe/Stockholm')
          $Now = [System.TimeZoneInfo]::ConvertTimeFromUtc([DateTime]::UtcNow, $TZ)

          $Indices = @(
              @{ Name = "OMXSPI";        Ticker = "OMXSPI.INDX"; Market = "SE" }
              @{ Name = "OMXS30";        Ticker = "OMXS30.INDX"; Market = "SE" }
              @{ Name = "S&P 500 (ETF)"; Ticker = "SPY";         Market = "US" }
              @{ Name = "DJI (ETF)";     Ticker = "DIA";         Market = "US" }
          )

          function Get-WeeklyData([string]$Ticker) {
              $Year = $Now.Year.ToString()
              $Enc  = [Uri]::EscapeDataString($Ticker)
              $R    = Invoke-RestMethod `
                          -Uri "https://api.twelvedata.com/time_series?symbol=$Enc&interval=1day&outputsize=253&apikey=$($env:TWELVEDATA_KEY)" `
                          -ErrorAction Stop
              if ($R.status -eq "error") { throw "Twelve Data: $($R.message)" }
              $Rows = @($R.values | ForEach-Object {
                  [PSCustomObject]@{ date = $_.datetime; close = [double]$_.close }
              })
              $N    = $Rows.Count
              $Last = $Rows[0].close
              $WkAgo = $N -ge 6 ? $Rows[5].close : $Rows[$N-1].close
              $YtdRow = $Rows | Where-Object { $_.date -like "$Year*" } | Select-Object -Last 1

              function Pct($From) {
                  if (-not $From -or $From -eq 0) { return $null }
                  [math]::Round(($Last - $From) / $From * 100, 2)
              }

              [PSCustomObject]@{
                  Close    = [math]::Round($Last, 2)
                  WeekPct  = Pct $WkAgo
                  MonthPct = Pct ($N -ge 22 ? $Rows[21].close : $Rows[$N-1].close)
                  YtdPct   = Pct $YtdRow.close
                  YearPct  = Pct ($N -ge 252 ? $Rows[251].close : $Rows[$N-1].close)
              }
          }

          function Get-SeWeeklyData([string]$Ticker) {
              $Year = $Now.Year.ToString()
              $Enc  = [Uri]::EscapeDataString($Ticker)
              $Raw  = Invoke-RestMethod `
                          -Uri "https://eodhd.com/api/eod/$Enc`?api_token=$($env:EODHD_KEY)&fmt=json&order=d&limit=253" `
                          -ErrorAction Stop
              if (-not $Raw -or $Raw.Count -eq 0) { throw "No data returned for $Ticker" }
              $Rows = @($Raw | ForEach-Object {
                  [PSCustomObject]@{ date = $_.date; close = [double]$_.close }
              })
              $N    = $Rows.Count
              $Last = $Rows[0].close
              $WkAgo = $N -ge 6 ? $Rows[5].close : $Rows[$N-1].close
              $YtdRow = $Rows | Where-Object { $_.date -like "$Year*" } | Select-Object -Last 1

              function Pct($From) {
                  if (-not $From -or $From -eq 0) { return $null }
                  [math]::Round(($Last - $From) / $From * 100, 2)
              }

              [PSCustomObject]@{
                  Close    = [math]::Round($Last, 2)
                  WeekPct  = Pct $WkAgo
                  MonthPct = Pct ($N -ge 22 ? $Rows[21].close : $Rows[$N-1].close)
                  YtdPct   = Pct $YtdRow.close
                  YearPct  = Pct ($N -ge 252 ? $Rows[251].close : $Rows[$N-1].close)
              }
          }

          function Fmt([object]$v) {
              if ($null -eq $v) { return "N/A" }
              "$(if ($v -ge 0) { '🟢 +' } else { '🔴 ' })$v%"
          }

          function FmtFlat([object]$v) {
              if ($null -eq $v) { return "N/A" }
              $r = [int][math]::Round($v, 0)
              "$(if ($r -ge 0) { '+' })$r%"
          }

          $LastFriday = $Now.AddDays(-2).ToString('yyyy-MM-dd')

          $lines = @(
              "<b>Weekly Index Market Digest 📊</b>"
              "Week ending Friday $LastFriday"
              "<i>This week's movement</i>"
              ""
          )

          $Results = @()
          foreach ($idx in $Indices) {
              $Flag = switch ($idx.Market) {
                  "SE"     { "🇸🇪" }
                  "US"     { "🇺🇸" }
                  "CRYPTO" { "₿" }
                  default  { $idx.Market }
              }
              try {
                  $d = if ($idx.Market -eq "SE") { Get-SeWeeklyData $idx.Ticker } else { Get-WeeklyData $idx.Ticker }
                  $Results += [PSCustomObject]@{
                      Name     = $idx.Name
                      Flag     = $Flag
                      Close    = $d.Close
                      WeekPct  = $d.WeekPct
                      MonthPct = $d.MonthPct
                      YtdPct   = $d.YtdPct
                      YearPct  = $d.YearPct
                  }
              } catch {
                  $Results += [PSCustomObject]@{
                      Name     = $idx.Name
                      Flag     = $Flag
                      Close    = $null
                      WeekPct  = $null
                      MonthPct = $null
                      YtdPct   = $null
                      YearPct  = $null
                      Error    = $true
                  }
              }
          }

          $Results = $Results | Sort-Object -Property WeekPct -Descending

          foreach ($r in $Results) {
              if ($r.Error) {
                  $lines += "<b>$($r.Flag) $($r.Name)</b> — unavailable ⚠️"
              } else {
                  $lines += "<b>$($r.Flag) $($r.Name)</b> — $($r.Close) $(Fmt $r.WeekPct)"
                  $lines += "1M~$(FmtFlat $r.MonthPct)|YTD~$(FmtFlat $r.YtdPct)|1Y~$(FmtFlat $r.YearPct)"
              }
          }

          $body = @{
              chat_id    = $env:TELEGRAM_CHAT_ID
              text       = ($lines -join "`n")
              parse_mode = "HTML"
          } | ConvertTo-Json -Depth 3

          Invoke-RestMethod -Uri "https://api.telegram.org/bot$($env:TELEGRAM_TOKEN)/sendMessage" `
              -Method Post -Body $body -ContentType "application/json; charset=utf-8"
          Write-Host "Weekly digest sent."
